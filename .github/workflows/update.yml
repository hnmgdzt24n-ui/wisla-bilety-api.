name: Aktualizacja Biletow
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4
      
      - name: Instalacja środowiska
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalacja zaleznosci
        run: npm install

      - name: Uruchomienie AI Scrapera
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scraper.js

      - name: Zapisanie pliku na serwerze
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git pull --rebase # TO JEST KLUCZ: najpierw pobiera Twoje zmiany
          git add events.json
          git commit -m "Aktualizacja statystyk" || exit 0
          git push
