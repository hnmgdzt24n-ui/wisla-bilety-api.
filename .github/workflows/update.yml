Name: Aktualizacja Biletow
on:
  schedule:
    # Zmieniono z */30 na */15 (uruchomienie co 15 minut)
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4
      
      - name: Instalacja środowiska
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalacja zaleznosci
        run: npm install

      - name: Uruchomienie AI Scrapera
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: node scraper.js

      - name: Zapisanie pliku na serwerze
        run: |
          git config --global user.name 'GitHub Action Bot'
          git config --global user.email 'action@github.com'
          git add events.json
          git commit -m "Aktualizacja statystyk" || exit 0
          git pull --rebase
          git push
